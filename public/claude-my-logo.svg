<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Square orange background -->
  <rect width="200" height="200" fill="#D4684A"/>

  <!-- Crescent moon wrapping the left -->
  <path d="M96 38 A62 62 0 1 0 96 162 A46 46 0 1 1 96 38 Z" fill="white"/>

  <!-- Citrus-wheel: tapered spokes radiating from centre (~112,100) -->
  <g fill="white" transform="translate(112,100)">
    <!-- full wheel of 16 spokes; left-side ones are shorter (peek through crescent) -->
    <polygon points="0,-3.4 60,-9 60,9 0,3.4" transform="rotate(-90)"/>
    <polygon points="0,-3.4 58,-9 58,9 0,3.4" transform="rotate(-67.5)"/>
    <polygon points="0,-3.4 60,-9 60,9 0,3.4" transform="rotate(-45)"/>
    <polygon points="0,-3.4 58,-9 58,9 0,3.4" transform="rotate(-22.5)"/>
    <polygon points="0,-3.4 60,-9 60,9 0,3.4" transform="rotate(0)"/>
    <polygon points="0,-3.4 58,-9 58,9 0,3.4" transform="rotate(22.5)"/>
    <polygon points="0,-3.4 60,-9 60,9 0,3.4" transform="rotate(45)"/>
    <polygon points="0,-3.4 58,-9 58,9 0,3.4" transform="rotate(67.5)"/>
    <polygon points="0,-3.4 60,-9 60,9 0,3.4" transform="rotate(90)"/>
    <!-- left half: progressively shorter so the crescent reads cleanly -->
    <polygon points="0,-3 40,-7 40,7 0,3" transform="rotate(112.5)"/>
    <polygon points="0,-2.6 30,-6 30,6 0,2.6" transform="rotate(135)"/>
    <polygon points="0,-2.4 24,-5 24,5 0,2.4" transform="rotate(157.5)"/>
    <polygon points="0,-2.4 22,-5 22,5 0,2.4" transform="rotate(180)"/>
    <polygon points="0,-2.4 24,-5 24,5 0,2.4" transform="rotate(202.5)"/>
    <polygon points="0,-2.6 30,-6 30,6 0,2.6" transform="rotate(225)"/>
    <polygon points="0,-3 40,-7 40,7 0,3" transform="rotate(247.5)"/>
    <!-- hub -->
    <circle cx="0" cy="0" r="4.5"/>
  </g>

  <!-- 8-pointed star near crescent top -->
  <g fill="white" transform="translate(82,60)">
    <polygon points="0,-11 2.6,-2.6 11,0 2.6,2.6 0,11 -2.6,2.6 -11,0 -2.6,-2.6"/>
  </g>
</svg>
